version: "3.9"

services:
  # ─── Backend ────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai_biz_backend
    ports:
      - "8000:8000"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - TAVILY_API_KEY=${TAVILY_API_KEY}
      - DATABASE_URL=${DATABASE_URL}
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:3000}
    depends_on:
      - db
    volumes:
      - ./backend:/app
    networks:
      - ai_biz_net
    restart: unless-stopped

  # ─── Frontend ───────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ai_biz_frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
    networks:
      - ai_biz_net
    restart: unless-stopped

  # ─── Database ───────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: ai_biz_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: ai_biz_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ai_biz_net
    restart: unless-stopped

  # ─── Nginx Reverse Proxy ────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: ai_biz_nginx
    ports:
      - "80:80"
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - ai_biz_net
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  ai_biz_net:
    driver: bridge
