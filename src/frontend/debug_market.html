<!DOCTYPE html>
<html>
<head>
    <title>Market API Debug</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background: #1a1a1a; color: white; }
        .container { max-width: 800px; margin: 0 auto; }
        .test-section { margin: 20px 0; padding: 20px; border: 1px solid #333; border-radius: 8px; }
        button { background: #4f46e5; color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; margin: 10px 5px; }
        button:hover { background: #6366f1; }
        .result { margin: 10px 0; padding: 10px; background: #2d2d2d; border-radius: 4px; white-space: pre-wrap; font-family: monospace; max-height: 400px; overflow-y: auto; }
        .success { border-left: 4px solid #10b981; }
        .error { border-left: 4px solid #ef4444; }
        input { padding: 8px; margin: 5px; border-radius: 4px; border: 1px solid #555; background: #2d2d2d; color: white; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Market Intelligence API Debug</h1>
        
        <div class="test-section">
            <h2>Test Market API Call</h2>
            <div>
                <input type="text" id="industry" value="saas" placeholder="Industry">
                <input type="text" id="targetMarket" value="Global" placeholder="Target Market">
            </div>
            <button onclick="testMarketAPI()">Test Market API</button>
            <div id="result" class="result"></div>
        </div>

        <div class="test-section">
            <h2>Console Log</h2>
            <div id="console" class="result">Console output will appear here...</div>
        </div>
    </div>

    <script>
        // Override console.log to display on page
        const originalLog = console.log;
        const consoleDiv = document.getElementById('console');
        console.log = function(...args) {
            originalLog.apply(console, args);
            consoleDiv.textContent += args.join(' ') + '\n';
        };

        async function testMarketAPI() {
            const resultDiv = document.getElementById('result');
            const industry = document.getElementById('industry').value;
            const targetMarket = document.getElementById('targetMarket').value;
            
            console.log('Testing market API...');
            console.log('Industry:', industry);
            console.log('Target Market:', targetMarket);
            
            resultDiv.textContent = 'Testing...';
            
            try {
                const requestData = {
                    industry: industry,
                    target_market: targetMarket
                };
                
                console.log('Request data:', JSON.stringify(requestData, null, 2));
                
                const response = await fetch('http://localhost:8000/api/v1/market/analyze', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(requestData)
                });
                
                console.log('Response status:', response.status);
                console.log('Response headers:', [...response.headers.entries()]);
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                
                const data = await response.json();
                console.log('Response data:', JSON.stringify(data, null, 2));
                
                resultDiv.className = 'result success';
                resultDiv.textContent = `✅ Success!
Industry: ${data.industry}
Market Size: ${data.market_size_estimate}
CAGR: ${data.cagr_estimate}
Trends: ${data.key_trends?.length || 0} items
Opportunities: ${data.opportunities?.length || 0} items
Risks: ${data.risks?.length || 0} items
Competitors: ${data.top_competitors?.length || 0} items

Full Response:
${JSON.stringify(data, null, 2)}`;
                
            } catch (error) {
                console.error('Error:', error);
                resultDiv.className = 'result error';
                resultDiv.textContent = `❌ Error: ${error.message}`;
            }
        }

        // Auto-test on page load
        window.onload = () => {
            testMarketAPI();
        };
    </script>
</body>
</html>
